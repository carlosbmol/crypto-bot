name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Syntax & style check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install linting tools
        run: pip install flake8

      - name: Check syntax (flake8)
        run: |
          flake8 src/ scripts/ docker/ \
            --select=E9,F63,F7,F82 \
            --max-line-length=120 \
            --exclude=scripts/backtest_week.py
