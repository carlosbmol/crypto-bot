services:
  tv-webhook:
    build: .
    container_name: tv-webhook
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - WEBHOOK_SECRET=${WEBHOOK_SECRET}
      - MT5_EXECUTOR_URL=http://host.docker.internal:5001
    extra_hosts:
      - "host.docker.internal:host-gateway"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  ngrok:
    image: ngrok/ngrok:latest
    container_name: tv-ngrok
    restart: unless-stopped
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http tv-webhook:5000 --log=stdout
    ports:
      - "4040:4040"
    depends_on:
      - tv-webhook
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
